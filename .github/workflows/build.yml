name: Build

on:
  push:
    branches:
      - master
      - development/**
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DisplayPilot.slnx

      - name: Build
        run: dotnet build DisplayPilot.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DisplayPilot.slnx --configuration Release --no-build --logger trx

      - name: Publish verification app
        run: >-
          dotnet publish src/DisplayPilot.App/DisplayPilot.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output artifacts/DisplayPilot-win-x64

      - name: Upload verification app
        uses: actions/upload-artifact@v4
        with:
          name: DisplayPilot-win-x64
          path: artifacts/DisplayPilot-win-x64
          if-no-files-found: error
